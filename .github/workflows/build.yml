on: [push, pull_request]

name: build

jobs:
  pingora:
    name: ${{ matrix.os }} (${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        # nightly, msrv, and latest stable
        toolchain: [nightly, 1.84.0, 1.91.1]
    runs-on: ${{ matrix.os }}
    # Only run on "pull_request" event for external PRs. This is to avoid
    # duplicate builds for PRs created from internal branches.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake libclang-dev wget gnupg ca-certificates lsb-release --no-install-recommends
          # openresty is used for convenience in tests as a server.
          # arm64 packages are under a separate repo URL.
          wget -O - https://openresty.org/package/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/openresty.gpg
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "arm64" ]; then
            REPO_URL="http://openresty.org/package/arm64/ubuntu"
          else
            REPO_URL="http://openresty.org/package/ubuntu"
          fi
          echo "deb [arch=$ARCH signed-by=/usr/share/keyrings/openresty.gpg] $REPO_URL $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/openresty.list > /dev/null
          sudo apt update
          sudo apt install -y openresty --no-install-recommends

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS only assigns 127.0.0.1 to loopback by default (Linux
          # assigns the entire 127.0.0.0/8). Tests bind to 127.0.0.2.
          sudo ifconfig lo0 alias 127.0.0.2
          brew tap openresty/brew
          # The openresty formula tries to build with the GeoIP nginx module
          # by default, but the legacy libGeoIP library is no longer available
          # in Homebrew and the --without-geoip option is no longer supported.
          # Patch the formula to remove geoip references before building.
          sed -i '' '/geoip/Id' "$(brew --prefix)/Library/Taps/openresty/homebrew-brew/Formula/openresty.rb"
          brew install --build-from-source openresty/brew/openresty
          echo "$(brew --prefix openresty)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix openresty)/nginx/sbin" >> $GITHUB_PATH

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run cargo test
        if: matrix.toolchain != '1.84.0'
        run: cargo test --verbose --lib --bins --tests --no-fail-fast

      # Need to run doc tests separately.
      # (https://github.com/rust-lang/cargo/issues/6669)
      - name: Run cargo doc test
        if: matrix.toolchain != '1.84.0'
        run: cargo test --verbose --doc

      - name: Run cargo clippy
        run: |
          [[ ${{ matrix.toolchain }} != 1.91.1 ]] || cargo clippy --all-targets --all -- --allow=unknown-lints --deny=warnings

      - name: Run cargo audit
        run: |
          [[ ${{ matrix.toolchain }} != 1.91.1 ]] || (cargo install --locked cargo-audit && cargo generate-lockfile --ignore-rust-version && cargo audit)

      - name: Run cargo machete
        run: |
          [[ ${{ matrix.toolchain }} != 1.91.1 ]] || (cargo install cargo-machete --version 0.7.0 && cargo machete)
